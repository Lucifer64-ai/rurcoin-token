name: Compile FunC Contracts

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Blueprint
        run: npm install --global @ton/blueprint

      - name: Install func compiler
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget
          wget -q https://github.com/ton-blockchain/ton/releases/latest/download/func -O /usr/local/bin/func
          chmod +x /usr/local/bin/func

      - name: Download stdlib.fc
        run: |
          mkdir -p contracts/imports
          wget -q https://raw.githubusercontent.com/ton-blockchain/ton/master/crypto/smartcont/stdlib.fc -O contracts/imports/stdlib.fc

      - name: Compile jetton-minter.fc
        run: |
          mkdir -p build
          func -o build/jetton-minter.fif -SPA contracts/imports/stdlib.fc contracts/jetton-minter.fc
          echo "✅ jetton-minter compiled"

      - name: Compile jetton-wallet.fc
        run: |
          func -o build/jetton-wallet.fif -SPA contracts/imports/stdlib.fc contracts/jetton-wallet.fc
          echo "✅ jetton-wallet compiled"

      - name: Convert Fift to BOC
        run: |
          wget -q https://github.com/ton-blockchain/ton/releases/latest/download/fift -O /usr/local/bin/fift
          chmod +x /usr/local/bin/fift
          wget -q https://github.com/ton-blockchain/ton/releases/latest/download/fiftlib.zip -O /tmp/fiftlib.zip
          unzip -q /tmp/fiftlib.zip -d /usr/local/lib/fift
          export FIFTPATH=/usr/local/lib/fift
          fift -s build/jetton-minter.fif
          fift -s build/jetton-wallet.fif
          ls -la build/

      - name: Upload BOC artifacts
        uses: actions/upload-artifact@v3
        with:
          name: compiled-contracts
          path: |
            build/*.boc
            build/*.fif
          retention-days: 30

      - name: Show build results
        run: |
          echo "=== Build complete ==="
          ls -la build/
          echo "Download artifacts from Actions tab"
