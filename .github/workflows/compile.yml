name: Compile FunC Contracts

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ton-compiler
        run: npm install -g ton-compiler

      - name: Download stdlib
        run: |
          mkdir -p contracts/imports
          curl -fsSL https://raw.githubusercontent.com/ton-blockchain/ton/master/crypto/smartcont/stdlib.fc -o contracts/imports/stdlib.fc

      - name: Compile contracts
        run: |
          mkdir -p build
          ton-compiler --input contracts/jetton-minter.fc --stdlib contracts/imports/stdlib.fc --output build/jetton-minter.boc
          ton-compiler --input contracts/jetton-wallet.fc --stdlib contracts/imports/stdlib.fc --output build/jetton-wallet.boc
          ls -la build/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: compiled-contracts
          path: build/*.boc
          retention-days: 30
