name: Deploy RURC Contract

on:
  push:
    branches:
      - deploy

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install --save-dev @ton/ton @ton/crypto @ton/core
          npm install --save-dev @ton-community/func-js

      - name: Compile FunC contracts via func-js
        run: node scripts/compile.js

      - name: Deploy contract
        env:
          WALLET_MNEMONIC: ${{ secrets.WALLET_MNEMONIC }}
          TONCENTER_API_KEY: ${{ secrets.TONCENTER_API_KEY }}
          OWNER_ADDRESS: UQB3PcMK0rW2etIRSV0IVnPZYf8xRC4b-h0wcsKNe7v5E-02
        run: node scripts/deploy.js

      - name: Save contract address
        uses: actions/upload-artifact@v4
        with:
          name: contract-address
          path: build/contract-address.txt
